name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
      - "VERSION"
      - "README.md"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Check LICENSE file
        run: test -f LICENSE || (echo "::error::LICENSE file is missing" && exit 1)

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test:
    name: Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: |
          set -o pipefail
          go test -race -count=1 -coverprofile=coverage.out -json ./... | tee test-results.json

      - name: Check coverage threshold
        run: |
          # Ratchet: 75% reflects current level. Raise as coverage improves; do not lower.
          THRESHOLD=75
          COVERAGE=$(go tool cover -func=coverage.out | grep ^total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if awk "BEGIN { exit !(${COVERAGE} < ${THRESHOLD}) }"; then
            echo "::error::Coverage ${COVERAGE}% is below the ${THRESHOLD}% threshold"
            exit 1
          fi

      - name: Publish test results
        if: always()
        uses: jedi-knights/publish-test-results@v0.3.0
        with:
          files: test-results.json
          check-name: Test Results
